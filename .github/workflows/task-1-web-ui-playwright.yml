name: Task 1 - Playwright UI Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "task-1-web-ui-automation/**"
      - ".github/workflows/task-1-web-ui-playwright.yml"
  pull_request:
    branches: [main]
    paths:
      - "task-1-web-ui-automation/**"
      - ".github/workflows/task-1-web-ui-playwright.yml"

permissions:
  contents: read

jobs:
  playwright-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: task-1-web-ui-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-1-web-ui-automation/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright UI tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-task-1
          path: task-1-web-ui-automation/playwright-report/
          retention-days: 7

      - name: Upload test results (traces/screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-task-1
          path: task-1-web-ui-automation/test-results/
          retention-days: 7
