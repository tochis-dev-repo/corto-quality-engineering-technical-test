name: Task 2 - Playwright API Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "task-2-rest-api-automation/**"
      - ".github/workflows/task-2-rest-api-playwright.yml"
  pull_request:
    branches: [main]
    paths:
      - "task-2-rest-api-automation/**"
      - ".github/workflows/task-2-rest-api-playwright.yml"

permissions:
  contents: read

jobs:
  playwright-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: task-2-rest-api-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Playwright API tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-task-2
          path: task-2-rest-api-automation/playwright-report/
          retention-days: 7

      - name: Upload test results (traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-task-2
          path: task-2-rest-api-automation/test-results/
          retention-days: 7
